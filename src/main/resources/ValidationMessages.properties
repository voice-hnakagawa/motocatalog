jakarta.validation.constraints.Size.message={0}は{min}文字以上{max}文字以下で入力してください
jakarta.validation.constraints.NotBlank.message={0}は必須項目です
jakarta.validation.constraints.Min.message={0}は{value}以上で入力してください
jakarta.validation.constraints.Max.message={0}は{value}以下で入力してください
jakarta.validation.constraints.NotNull.message={0}は必須項目です