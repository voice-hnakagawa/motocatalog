<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <!-- As a heading -->
    <nav class="navbar navbar-dark bg-dark mb-3">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">バイク管理</span>
        </div>
    </nav>
    <div class="container">
        <div class="row">
            <div class="col">
                <div class="mb-3">
                    <label for="brand" class="form-label">バイクメーカー</label>
                    <select class="form-select" id="brand" aria-label="Default select example">
                        <option selected>Honda</option>
                        <option value="1">Kawasaki</option>
                        <option value="2">Yamaha</option>
                        <option value="3">Suzuki</option>
                    </select>
                </div>
            </div>
            <div class="col">
                <div class="mb-3">
                    <label for="keyword" class="form-label">キーワード</label>
                    <input type="text" class="form-control" id="keyword" placeholder="">
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col d-flex flex-row-reverse">
                <button type="button" class="btn btn-primary">新規</button>
                <button type="button" class="btn btn-secondary ms-1 me-1">リセット</button>
                <button type="button" class="btn btn-success">検索</button>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col">
                <table class="table table-dark table-striped">
                    <thead>
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col">メーカー</th>
                            <th scope="col">車名</th>
                            <th scope="col">エンジン</th>
                            <th scope="col">価格</th>
                            <th scope="col">コメント</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <th scope="row">1</th>
                            <td>Honda</td>
                            <td>CBR600RR</td>
                            <td>600cc</td>
                            <td>¥500,000</td>
                            <td>良いバイクです。</td>
                        </tr>
                        <tr>
                            <th scope="row">2</th>
                            <td>Kawasaki</td>
                            <td>Ninja ZX-14R</td>
                            <td>1,400cc</td>
                            <td>¥1,200,000</td>
                            <td>高性能です。</td>
                        </tr>
                        <tr>
                            <th scope="row">3</th>
                            <td>Yamaha</td>
                            <td>YZF-R1</td>
                            <td>1,000cc</td>
                            <td>¥1,000,000</td>
                            <td>スポーツバイクの代表格。</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
