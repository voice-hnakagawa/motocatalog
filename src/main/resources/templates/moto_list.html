<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{site.title}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <!-- As a heading -->
    <nav class="navbar navbar-dark bg-dark mb-3">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" th:text="#{site.title}"></span>
        </div>
    </nav>

    <div class="container">
        <form method="get" th:action="@{/motos}">
            <div class="row justify-content-end">
                <div class="col-2">
                    <div th:text="${#temporals.format(datetime, 'dd/MM/yyyy HH:mm:ss')}"></div>
                </div>
            </div>
            <div class="row justify-content-around">
                <div class="col-3">
                    <div class="mb-3">
                        <label for="brand" class="form-label" th:text="#{searchForm.brand}"></label>
                        <select class="form-select" th:field="${searchForm.brandId}" id="brand"
                            aria-label="Default select example">
                            <!-- <option selected>Honda</option>
                        <option value="1">Kawasaki</option>
                        <option value="2">Yamaha</option>
                        <option value="3">Suzuki</option> -->
                            <option value="" th:text="#{searchForm.brand.placeholder}"></option>

                            <option th:each="brand : ${brands}" th:value="${brand.brandId}"
                                th:text="${brand.brandName}">
                            </option>
                        </select>
                    </div>
                </div>
                <div class="col-5">
                    <div class="mb-3">
                        <label for="keyword" class="form-label" th:text="#{searchForm.keyword}"></label>
                        <input type="text" class="form-control" th:field="${searchForm.keyword}" id="keyword"
                            placeholder="車名もしくはコメントの一部を入力してください">
                        <div th:errors="${searchForm.keyword}" class="text-danger"></div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col d-flex flex-row-reverse">
                    <a type="button" class="btn btn-primary" th:href="@{/motos/new}" th:text="#{searchForm.new}"></a>
                    <a th:href="@{/motos/reset}" class="btn btn-secondary ms-1 me-1" th:text="#{searchForm.reset}"></a>
                    <button type="submit" class="btn btn-success" th:text="#{searchForm.search}"></button>
                </div>
            </div>
        </form>
        <div class="row mt-3">
            <div class="col">
                <table class="table table-dark table-striped">
                    <thead>
                        <tr>
                            <th scope="col" th:text="#{table.no}" class="text-center"></th>
                            <th scope="col" th:text="#{table.brand}" class="text-center"></th>
                            <th scope="col" th:text="#{table.model}" class="text-center"></th>
                            <th scope="col" th:text="#{table.engine}" class="text-center"></th>
                            <th scope="col" th:text="#{table.price}" class="text-center"></th>
                            <th scope="col" th:text="#{table.comment}" class="text-center"></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="motorcycle : ${motorcycles}">
                            <th scope="row" th:text="${motorcycle.motoNo}"></th>
                            <td th:text="${motorcycle.brandId.brandName}"></td>
                            <td><a th:href="@{/motos/{id}(id=${motorcycle.motoNo})}" th:text="${motorcycle.motoName}"></a></td>
                            <td th:text="${motorcycle.cooling} + ${motorcycle.cylinder}"></td>
                            <td th:text="|¥*{#numbers.formatInteger(motorcycle.price, 3, 'COMMA')}|" class="text-end">
                            </td>
                            <td th:text="${motorcycle.comment}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
