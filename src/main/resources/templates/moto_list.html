<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{site.title}"></title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-50 text-zinc-900 min-h-screen antialiased">

    <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-zinc-100">
        <div class="max-w-6xl mx-auto px-8 h-14 flex items-center justify-between">
            <span class="text-sm font-semibold tracking-tight" th:text="#{site.title}"></span>
            <form th:action="@{/logout}" method="post">
                <button type="submit"
                    class="text-xs text-zinc-400 hover:text-zinc-700 transition-colors"
                    th:text="#{page.logout}"></button>
            </form>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-8">

        <div class="pt-10 pb-8 border-b border-zinc-200 flex items-end justify-between">
            <h1 class="text-3xl font-bold tracking-tight text-zinc-900" th:text="#{site.title}"></h1>
            <span class="text-xs text-zinc-400 pb-1"
                th:text="${#temporals.format(datetime, 'dd/MM/yyyy HH:mm:ss')}"></span>
        </div>

        <form method="get" th:action="@{/motos}">
            <div class="py-5 flex flex-wrap items-end gap-3 border-b border-zinc-100">

                <div class="flex flex-col gap-1.5">
                    <label for="brand"
                        class="text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]"
                        th:text="#{searchForm.brand}"></label>
                    <select
                        class="h-9 min-w-[160px] border border-zinc-200 bg-white text-zinc-800 text-sm rounded-lg px-3 focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 transition"
                        th:field="${searchForm.brandId}" id="brand">
                        <option value="" th:text="#{searchForm.brand.placeholder}"></option>
                        <option th:each="brand : ${brands}" th:value="${brand.brandId}"
                            th:text="${brand.brandName}"></option>
                    </select>
                </div>

                <div class="flex flex-col gap-1.5 flex-1 min-w-[240px]">
                    <label for="keyword"
                        class="text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]"
                        th:text="#{searchForm.keyword}"></label>
                    <input type="text"
                        class="h-9 border border-zinc-200 bg-white text-zinc-800 text-sm rounded-lg px-3 focus:outline-none focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 transition"
                        th:field="${searchForm.keyword}" id="keyword"
                        placeholder="車名もしくはコメントの一部を入力してください">
                </div>

                <div class="flex items-center gap-2 pb-0">
                    <button type="submit"
                        class="h-9 px-5 text-sm font-medium bg-zinc-900 text-white rounded-lg hover:bg-zinc-700 transition-colors"
                        th:text="#{searchForm.search}"></button>
                    <a th:href="@{/motos/reset}"
                        class="h-9 px-4 text-sm text-zinc-500 border border-zinc-200 bg-white rounded-lg hover:bg-zinc-50 transition-colors inline-flex items-center"
                        th:text="#{searchForm.reset}"></a>
                </div>

                <div class="ml-auto">
                    <a th:href="@{/motos/new}"
                        class="h-9 px-5 text-sm font-medium bg-indigo-600 text-white rounded-lg hover:bg-indigo-500 transition-colors inline-flex items-center gap-1.5"
                        th:text="#{searchForm.new}"></a>
                </div>

            </div>
            <div th:errors="${searchForm.keyword}" class="pt-2 text-xs text-red-500"></div>
        </form>

        <div class="py-6 overflow-x-auto">
            <table class="w-full text-sm border-collapse">
                <thead>
                    <tr>
                        <th scope="col"
                            class="pb-3 pr-6 text-left text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em] w-10"
                            th:text="#{table.no}"></th>
                        <th scope="col"
                            class="pb-3 pr-6 text-left text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]"
                            th:text="#{table.brand}"></th>
                        <th scope="col"
                            class="pb-3 pr-6 text-left text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]"
                            th:text="#{table.model}"></th>
                        <th scope="col"
                            class="pb-3 pr-6 text-left text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]"
                            th:text="#{table.engine}"></th>
                        <th scope="col"
                            class="pb-3 pr-6 text-right text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]"
                            th:text="#{table.price}"></th>
                        <th scope="col"
                            class="pb-3 text-left text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]"
                            th:text="#{table.comment}"></th>
                    </tr>
                    <tr>
                        <td colspan="6" class="pb-2">
                            <div class="h-px bg-zinc-900"></div>
                        </td>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="motorcycle : ${motorcycles}"
                        th:onclick="|window.location='@{/motos/{id}(id=${motorcycle.motoNo})}'|"
                        class="group border-b border-zinc-100 hover:bg-white transition-colors cursor-pointer">
                        <td class="py-4 pr-6 text-xs text-zinc-400 tabular-nums align-top pt-[18px]"
                            th:text="${motorcycle.motoNo}"></td>
                        <td class="py-4 pr-6 text-zinc-500 whitespace-nowrap"
                            th:text="${motorcycle.brandId.brandName}"></td>
                        <td class="py-4 pr-6 font-semibold text-zinc-900 group-hover:text-indigo-600 transition-colors"
                            th:text="${motorcycle.motoName}"></td>
                        <td class="py-4 pr-6 text-zinc-500 whitespace-nowrap">
                            <span th:text="${motorcycle.cooling}"></span><span
                                th:text="${motorcycle.cylinder}"></span>
                        </td>
                        <td class="py-4 pr-6 text-right text-zinc-700 tabular-nums whitespace-nowrap">
                            <span th:if="${motorcycle.price != null}"
                                th:text="|¥${#numbers.formatInteger(motorcycle.price, 3, 'COMMA')}|"></span>
                        </td>
                        <td class="py-4 text-zinc-400 text-xs leading-relaxed"
                            th:text="${motorcycle.comment}"></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

</body>

</html>
