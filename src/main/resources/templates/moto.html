<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{site.title}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <!-- As a heading -->
    <nav class="navbar navbar-dark bg-dark mb-3">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1" th:text="#{site.title}"></span>
        </div>
    </nav>

    <div class="container">
        <form method="post" th:action="@{/motos/save}" th:object="${motoForm}">
            <div class="row">
                <div class="col">
                    <div class="alert alert-danger" role="alert" th:each="err : ${#fields.errors('*')}" th:text="${err}">エラーメッセージ</div>
                </div>
            </div>
            <div class="row" th:if="${motoForm.motoNo}">
                <div class="col">
                    <label for="brand" class="form-label">番号</label>
                    <span th:text="*{motoNo}"></span>
                    <input type="hidden" th:field="*{motoNo}">
                    <input type="hidden" th:field="*{version}">
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label for="brand" class="form-label">メーカー</label>
                    <select th:field="*{brandId}" class="form-select" id="brand" aria-label="Default select example">
                        <!-- <option value=""></option> -->
                        <option th:each="brand : ${brands}" th:value="${brand.brandId}" th:text="${brand.brandName}">
                        </option>
                    </select>
                </div>
                <div class="col">
                    <label for="motoName" class="form-label">車名</label>
                    <input th:field="*{motoName}" type="text" class="form-control" id="motoName" placeholder="">
                </div>
                <div class="col">
                    <label for="seatHeight" class="form-label" th:text="#{moto.seatHeight}"></label>
                    <input th:field="*{seatHeight}" type="text" class="form-control" id="seatHeight" placeholder="">
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label for="cylinder" class="form-label" th:text="#{moto.cylinder}"></label>
                    <input th:field="*{cylinder}" type="text" class="form-control" id="cylinder" placeholder="">
                </div>
                <div class="col">
                    <label for="cooling" class="form-label" th:text="#{moto.cooling}"></label>
                    <input th:field="*{cooling}" type="text" class="form-control" id="cooling" placeholder="">
                </div>
                <div class="col">
                    <label for="price" class="form-label" th:text="#{moto.price}"></label>
                    <input th:field="*{price}" type="text" class="form-control" id="price" placeholder="">
                </div>
            </div>
            <div class="row">
                <div class="col">
                    <label for="comment" class="form-label" th:text="#{moto.comment}"></label>
                    <textarea th:field="*{comment}" class="form-control" id="comment" placeholder=""></textarea>
                </div>
            </div>
            <div class="row mt-3">
                <div class="col text-end">
                    <button class="btn btn-primary" type="submit" th:text="#{moto.update}"></button>
                </div>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
