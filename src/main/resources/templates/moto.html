<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="#{site.title}"></title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-zinc-50 text-zinc-900 min-h-screen antialiased">

    <header class="sticky top-0 z-10 bg-white/80 backdrop-blur-md border-b border-zinc-100">
        <div class="max-w-6xl mx-auto px-8 h-14 flex items-center justify-between">
            <span class="text-sm font-semibold tracking-tight" th:text="#{site.title}"></span>
            <a th:href="@{/motos}" class="text-xs text-zinc-400 hover:text-zinc-700 transition-colors">← 戻る</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-8">

        <div class="pt-10 pb-8 border-b border-zinc-200">
            <h1 class="text-3xl font-bold tracking-tight text-zinc-900">
                <span th:if="${motoForm.motoNo}" th:text="${motoForm.motoName}"></span>
                <span th:unless="${motoForm.motoNo}" th:text="#{searchForm.new}"></span>
            </h1>
            <p th:if="${motoForm.motoNo}" class="mt-1 text-sm text-zinc-400">
                #<span th:text="${motoForm.motoNo}"></span>
            </p>
        </div>

        <form method="post" th:action="@{/motos/save}" th:object="${motoForm}" class="py-8">

            <div th:each="err : ${#fields.errors('global')}"
                class="mb-6 px-4 py-3 rounded-lg border border-red-200 bg-red-50 text-sm text-red-600"
                th:text="${err}"></div>

            <div th:if="${motoForm.motoNo}">
                <input type="hidden" th:field="*{motoNo}">
                <input type="hidden" th:field="*{version}">
            </div>

            <div class="grid grid-cols-3 gap-x-6 gap-y-5 mb-5">

                <div class="flex flex-col gap-1.5">
                    <div class="flex items-center gap-1.5">
                        <label for="brand" class="text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]">メーカー</label>
                        <span class="text-[10px] font-bold text-red-400 uppercase tracking-[0.12em]">必須</span>
                    </div>
                    <select id="brand" th:field="*{brandId}"
                        class="h-9 border bg-white text-zinc-800 text-sm rounded-lg px-3 focus:outline-none focus:ring-2 transition"
                        th:classappend="${#fields.hasErrors('brandId')} ? 'border-red-300 focus:ring-red-100 focus:border-red-400' : 'border-zinc-200 focus:ring-indigo-100 focus:border-indigo-400'">
                        <option value=""></option>
                        <option th:each="brand : ${brands}" th:value="${brand.brandId}" th:text="${brand.brandName}"></option>
                    </select>
                    <div th:errors="*{brandId}" class="text-xs text-red-500"></div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <div class="flex items-center gap-1.5">
                        <label for="motoName" class="text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]">車名</label>
                        <span class="text-[10px] font-bold text-red-400 uppercase tracking-[0.12em]">必須</span>
                    </div>
                    <input id="motoName" th:field="*{motoName}" type="text" maxlength="255"
                        class="h-9 border bg-white text-zinc-800 text-sm rounded-lg px-3 focus:outline-none focus:ring-2 transition"
                        th:classappend="${#fields.hasErrors('motoName')} ? 'border-red-300 focus:ring-red-100 focus:border-red-400' : 'border-zinc-200 focus:ring-indigo-100 focus:border-indigo-400'">
                    <div th:errors="*{motoName}" class="text-xs text-red-500"></div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="seatHeight" class="text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]"
                        th:text="#{moto.seatHeight}"></label>
                    <input id="seatHeight" th:field="*{seatHeight}" type="number"
                        class="h-9 border bg-white text-zinc-800 text-sm rounded-lg px-3 focus:outline-none focus:ring-2 transition"
                        th:classappend="${#fields.hasErrors('seatHeight')} ? 'border-red-300 focus:ring-red-100 focus:border-red-400' : 'border-zinc-200 focus:ring-indigo-100 focus:border-indigo-400'">
                    <div th:errors="*{seatHeight}" class="text-xs text-red-500"></div>
                </div>

            </div>

            <div class="grid grid-cols-3 gap-x-6 gap-y-5 mb-8">

                <div class="flex flex-col gap-1.5">
                    <label for="cylinder" class="text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]"
                        th:text="#{moto.cylinder}"></label>
                    <input id="cylinder" th:field="*{cylinder}" type="number"
                        class="h-9 border bg-white text-zinc-800 text-sm rounded-lg px-3 focus:outline-none focus:ring-2 transition"
                        th:classappend="${#fields.hasErrors('cylinder')} ? 'border-red-300 focus:ring-red-100 focus:border-red-400' : 'border-zinc-200 focus:ring-indigo-100 focus:border-indigo-400'">
                    <div th:errors="*{cylinder}" class="text-xs text-red-500"></div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="cooling" class="text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]"
                        th:text="#{moto.cooling}"></label>
                    <input id="cooling" th:field="*{cooling}" type="text" maxlength="20"
                        class="h-9 border bg-white text-zinc-800 text-sm rounded-lg px-3 focus:outline-none focus:ring-2 transition"
                        th:classappend="${#fields.hasErrors('cooling')} ? 'border-red-300 focus:ring-red-100 focus:border-red-400' : 'border-zinc-200 focus:ring-indigo-100 focus:border-indigo-400'">
                    <div th:errors="*{cooling}" class="text-xs text-red-500"></div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="price" class="text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]"
                        th:text="#{moto.price}"></label>
                    <input id="price" th:field="*{price}" type="number"
                        class="h-9 border bg-white text-zinc-800 text-sm rounded-lg px-3 focus:outline-none focus:ring-2 transition"
                        th:classappend="${#fields.hasErrors('price')} ? 'border-red-300 focus:ring-red-100 focus:border-red-400' : 'border-zinc-200 focus:ring-indigo-100 focus:border-indigo-400'">
                    <div th:errors="*{price}" class="text-xs text-red-500"></div>
                </div>

            </div>

            <div class="flex flex-col gap-1.5 mb-8">
                <label for="comment" class="text-[10px] font-bold text-zinc-400 uppercase tracking-[0.12em]"
                    th:text="#{moto.comment}"></label>
                <textarea id="comment" th:field="*{comment}" maxlength="255" rows="3"
                    class="border bg-white text-zinc-800 text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-2 transition resize-none"
                    th:classappend="${#fields.hasErrors('comment')} ? 'border-red-300 focus:ring-red-100 focus:border-red-400' : 'border-zinc-200 focus:ring-indigo-100 focus:border-indigo-400'"></textarea>
                <div th:errors="*{comment}" class="text-xs text-red-500"></div>
            </div>

            <div class="pt-5 border-t border-zinc-100 flex items-center justify-between">
                <button th:if="${motoForm.motoNo}" type="submit" th:formaction="@{/motos/delete}"
                    class="px-4 py-2 text-sm text-red-500 border border-red-200 rounded-lg hover:bg-red-50 transition-colors"
                    th:text="#{moto.delete}"></button>
                <div th:unless="${motoForm.motoNo}"></div>
                <button type="submit" th:formaction="@{/motos/save}"
                    class="px-6 py-2 text-sm font-medium bg-zinc-900 text-white rounded-lg hover:bg-zinc-700 transition-colors"
                    th:text="#{moto.update}"></button>
            </div>

        </form>

    </main>

</body>

</html>
