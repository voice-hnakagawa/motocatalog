version: '3.8'

services:
  db:
    image: mysql:latest
    # command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: motocatalogdb
      MYSQL_USER: develop
      MYSQL_PASSWORD: develop
    ports:
      - 3306:3306
      - 33060:33060


  adminer:
    image: adminer
    restart: always
    ports:
      - 9000:8080